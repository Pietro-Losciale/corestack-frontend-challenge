<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>


  

<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">frontend-challenge</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Dropdown
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">Action</a></li>
            <li><a class="dropdown-item" href="#">Another action</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="#">Something else here</a></li>
          </ul>
        </li>
        <li class="nav-item">
          <a class="nav-link disabled" aria-disabled="true">Disabled</a>
        </li>
      </ul>

      <!-- form di ricerca -->
      <form class="d-flex" role="search">
        <input id ="search" class="form-control me-2" type="search" placeholder="Cerca..." aria-label="Search"/>
        <button class="btn btn-outline-black" type="submit"> <i class="fas fa-search"></i> </button>
      </form>

      


    </div>
  </div>
</nav>



<!-- form aggiunta post -->
<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-6">

      <form id="postForm" class="d-flex flex-column gap-3">

          <input  id="title" class="form-control" placeholder="Titolo">
          <textarea id="body" class="form-control" placeholder="Descrizione"></textarea>
          <button class="btn btn-custom" type="submit">
            Pubblica post
          </button>

      </form>


      <!-- //messaggio di successo -->

      <div id="successMessage" class="alert alert-success mt-3 d-none">
        Post pubblicato con successo!
      </div>

      <!-- messaggio allerta duplicato -->

      <div id="errorMessage" class="alert alert-danger mt-3 d-none">
        Esiste già un post con questo titolo
      </div>

      <!-- messaggio allerta campo vuoto -->

      <div id="emptyMessage" class="alert alert-danger mt-3 d-none">
        Compila tutti i campi
      </div>


    </div>
  </div>
</div>






<div class="container">

  


  <div id="posts" class="row g-4"></div>

  
</div>




<footer class="bg-dark text-white text-center py-3 mt-4">
  <p class="mb-0">© 2026 - frontend-challenge</p>
</footer>




<script src="main.js"></script>


<script src="https://kit.fontawesome.com/928f34efb2.js" crossorigin="anonymous"></script>
</body>
</html>
